<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="system-ui, -apple-system, sans-serif">
  <!-- Hintergrund (CI dark) -->
  <rect width="800" height="380" fill="#0a0a0a"/>

  <!-- Titel -->
  <text x="40" y="34" fill="#c9a84c" font-size="16" font-weight="700" letter-spacing="2">SESSION-VERLAUF (BEISPIEL, 30 MIN)</text>
  <text x="40" y="54" fill="#888" font-size="11" letter-spacing="1">temperatur · luftfeuchte · 2 aufgüsse · 1 hz basistakt, 2 hz boost</text>

  <!-- Plot-Bereich: x = 60..760, y = 90..310 -->
  <!-- Y-Grid links (Temperatur 0..120 °C) -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="60" y1="310" x2="760" y2="310"/>
    <line x1="60" y1="273" x2="760" y2="273"/>
    <line x1="60" y1="237" x2="760" y2="237"/>
    <line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="163" x2="760" y2="163"/>
    <line x1="60" y1="127" x2="760" y2="127"/>
    <line x1="60" y1="90"  x2="760" y2="90"/>
  </g>

  <!-- Y-Achse links: Temperatur -->
  <g fill="#c9a84c" font-size="10" text-anchor="end">
    <text x="54" y="313">0 °C</text>
    <text x="54" y="276">20</text>
    <text x="54" y="240">40</text>
    <text x="54" y="203">60</text>
    <text x="54" y="166">80</text>
    <text x="54" y="130">100</text>
    <text x="54" y="93">120 °C</text>
  </g>

  <!-- Y-Achse rechts: Feuchte -->
  <g fill="#7fb39c" font-size="10" text-anchor="start">
    <text x="766" y="313">0 %</text>
    <text x="766" y="276">17</text>
    <text x="766" y="240">33</text>
    <text x="766" y="203">50</text>
    <text x="766" y="166">67</text>
    <text x="766" y="130">83</text>
    <text x="766" y="93">100 % RH</text>
  </g>

  <!-- X-Achse Beschriftung (0..30 min) -->
  <g fill="#888" font-size="10" text-anchor="middle">
    <text x="60"  y="328">0</text>
    <text x="177" y="328">5</text>
    <text x="293" y="328">10</text>
    <text x="410" y="328">15</text>
    <text x="527" y="328">20</text>
    <text x="643" y="328">25</text>
    <text x="760" y="328">30 min</text>
  </g>

  <!-- Aufguss-Marker (vertikale Linien bei min 17 und min 24) -->
  <g stroke="#c9a84c" stroke-dasharray="3 3" stroke-width="1" opacity="0.5">
    <line x1="457" y1="90" x2="457" y2="310"/>
    <line x1="620" y1="90" x2="620" y2="310"/>
  </g>
  <g fill="#c9a84c" font-size="10" font-weight="600" text-anchor="middle">
    <text x="457" y="82">AUFGUSS 1</text>
    <text x="620" y="82">AUFGUSS 2</text>
  </g>

  <!-- Temperatur-Kurve (Gold)
       Skala: x[min] -> px = 60 + (min/30)*700
              t[°C] -> px = 310 - (t/120)*220
       Verlauf:
         0..15 min: linearer anstieg 25 -> 92
         15..17:   plateau ~92
         17:       aufguss 1: kurzer dip auf ~88, dann zurück
         17..24:   plateau ~95
         24:       aufguss 2: dip auf ~91
         24..30:   plateau ~96 -->
  <polyline fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linejoin="round"
    points="60,264 95,256 130,247 175,236 220,222 270,205 320,188 370,175 410,166 440,160 457,159 462,165 470,162 485,158 510,154 540,150 580,148 615,147 620,151 628,149 645,147 680,144 720,142 760,141"/>

  <!-- Luftfeuchte-Kurve (Sage) - mit Aufguss-Spikes
       Skala: rh[%] -> px = 310 - (rh/100)*220
       Verlauf:
         0..15: 30 -> 22 % (heizphase trocknet)
         15..17: stabil ~20
         17: aufguss-spike auf 65%, dann abfall
         17..24: erholung 65 -> 28
         24: aufguss-spike auf 60%, dann abfall
         24..30: erholung 60 -> 30 -->
  <polyline fill="none" stroke="#7fb39c" stroke-width="2.5" stroke-linejoin="round"
    points="60,244 90,247 130,250 175,253 220,257 270,261 320,264 370,266 410,267 440,267 455,267 457,167 462,180 470,192 485,210 510,228 540,240 580,250 615,257 620,178 628,192 645,212 680,238 720,253 760,255"/>

  <!-- Legende -->
  <g font-size="11">
    <rect x="40" y="350" width="14" height="3" fill="#c9a84c"/>
    <text x="60" y="354" fill="#c9a84c">temperatur (°C)</text>
    <rect x="180" y="350" width="14" height="3" fill="#7fb39c"/>
    <text x="200" y="354" fill="#7fb39c">luftfeuchte (% RH)</text>
    <line x1="320" y1="351" x2="334" y2="351" stroke="#c9a84c" stroke-dasharray="3 3"/>
    <text x="340" y="354" fill="#c9a84c">aufguss-marker</text>
  </g>
</svg>
